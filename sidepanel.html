<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; padding: 15px; background: #1e1e1e; color: #d4d4d4; }
    h2 { color: #569cd6; font-size: 1.2em; border-bottom: 1px solid #333; padding-bottom: 8px; }
    select, button, textarea { width: 100%; margin-top: 10px; padding: 8px; border-radius: 4px; border: 1px solid #3c3c3c; background: #2d2d2d; color: white; }
    textarea { height: 200px; font-family: monospace; color: #ce9178; }
    button { background: #0e639c; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #1177bb; }
    .label { font-size: 0.8em; color: #888; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>Automation Spy</h2>
  
  <div class="label">ENGINE</div>
  <select id="engine">
    <option value="selenium">Selenium (Java)</option>
    <option value="playwright">Playwright (JS)</option>
  </select>

  <div class="label">SELECTOR TYPE</div>
  <select id="selectorType">
    <option value="id">ID</option>
    <option value="name">Name</option>
    <option value="css">CSS</option>
  </select>

  <textarea id="output" placeholder="// Alt + Click elements on the page..."></textarea>
  
  <button id="clear">Clear All</button>

  <script src="sidepanel.js"></script>
</body>
</html>
